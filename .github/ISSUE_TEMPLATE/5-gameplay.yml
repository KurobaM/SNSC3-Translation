name: Gameplay
description: Other gameplay related bugs
title: "Default"
labels: ["Misc. Translation Issues"]
body:
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Please embed the screenshot (you can click "Paste, drop, or click to add files").
    validations:
      required: true
  - type: input
    id: emulator
    attributes:
      label: Emulator
      description: Include name and version number. Also, use mGBA if you're not on a phone; VBA-M is generally less accurate.
    validations:
      required: true
  - type: input
    id: patchversion
    attributes:
      label: Patch Version
      description: Which version of the patch were you using (including the date)?
    validations:
      required: true
  - type: dropdown
    id: gender
    attributes:
      label: Player Gender
      multiple: false
      options:
        - Boy
        - Girl
    validations:
      required: true
  - type: dropdown
    id: partner
    attributes:
      label: Partner Character
      multiple: false
      options:
        - Run-Dor
        - Enzi
        - Killfith
        - Rufeel
    validations:
      required: true
  - type: input
    id: playername
    attributes:
      label: Player Character Name
    validations:
      required: true
  - type: input
    id: beastname
    attributes:
      label: Partner Name
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: How did you get this to happen?
      description: Leave blank if it's just "talk to this NPC"
    validations:
      required: false
  - type: checkboxes
    id: savestate
    attributes:
      label: Please link this issue in the Discord channel "#issue-links", and if necessary, attach the save state to it
      options:
        - label: I will do this.
          required: true